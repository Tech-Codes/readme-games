<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="240" fill="url(#bg)" rx="18"/>

  <!-- Stars Background -->
  <g fill="white" opacity="0.8">
    <circle cx="40" cy="30" r="1.5"/>
    <circle cx="120" cy="60" r="1"/>
    <circle cx="210" cy="40" r="1.2"/>
    <circle cx="310" cy="80" r="1.4"/>
    <circle cx="390" cy="20" r="1.1"/>
    <circle cx="480" cy="70" r="1.5"/>
    <circle cx="580" cy="50" r="1.2"/>
    <circle cx="660" cy="90" r="1.4"/>
    <circle cx="760" cy="35" r="1.3"/>
    <circle cx="840" cy="60" r="1.1"/>
  </g>

  <!-- Moving Stars -->
  <g>
    <circle cx="920" cy="50" r="5" fill="#fde047">
      <animate attributeName="cx" from="920" to="-20" dur="8s" repeatCount="indefinite"/>
    </circle>

    <circle cx="980" cy="120" r="5" fill="#fde047">
      <animate attributeName="cx" from="980" to="-20" dur="10s" repeatCount="indefinite"/>
    </circle>

    <circle cx="940" cy="190" r="5" fill="#fde047">
      <animate attributeName="cx" from="940" to="-20" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Asteroids -->
  <g>
    <circle cx="930" cy="70" r="12" fill="#ef4444">
      <animate attributeName="cx" from="930" to="-30" dur="6s" repeatCount="indefinite"/>
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 930 70"
        to="360 930 70"
        dur="2s"
        repeatCount="indefinite"/>
    </circle>

    <circle cx="980" cy="160" r="16" fill="#f87171">
      <animate attributeName="cx" from="980" to="-30" dur="9s" repeatCount="indefinite"/>
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 980 160"
        to="360 980 160"
        dur="3s"
        repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Spaceship -->
  <g filter="url(#glow)">
    <polygon points="80,120 40,100 40,140" fill="#38bdf8">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0 -8; 0 0; 0 8; 0 0"
        dur="3s"
        repeatCount="indefinite"/>
    </polygon>

    <circle cx="52" cy="120" r="4" fill="#ffffff">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 0 -8; 0 0; 0 8; 0 0"
        dur="3s"
        repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Laser -->
  <line x1="80" y1="120" x2="120" y2="120" stroke="#22d3ee" stroke-width="3">
    <animate attributeName="x2" values="120;150;120" dur="0.5s" repeatCount="indefinite"/>
  </line>

  <!-- Score -->
  <text x="30" y="220"
        fill="#ffffff"
        font-size="18"
        font-family="monospace">
    SCORE: 9999
  </text>

  <!-- Title -->
  <text x="450"
        y="35"
        text-anchor="middle"
        fill="#38bdf8"
        font-size="24"
        font-family="Verdana"
        font-weight="bold">
    SPACE RUNNER
  </text>
</svg>
