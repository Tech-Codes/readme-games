name: Space Runner Animation

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Generate SVG Game
        run: |
          cat > assets/space-runner.svg <<'EOF'
          <svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">

            <rect width="800" height="200" fill="#0f172a" rx="20"/>

            <!-- stars -->
            <circle cx="100" cy="40" r="2" fill="white"/>
            <circle cx="250" cy="70" r="2" fill="white"/>
            <circle cx="500" cy="50" r="2" fill="white"/>
            <circle cx="700" cy="90" r="2" fill="white"/>

            <!-- enemy -->
            <circle r="12" fill="#ef4444">
              <animateMotion
                dur="6s"
                repeatCount="indefinite"
                path="M850 60 L-50 60"/>
            </circle>

            <!-- collectible -->
            <circle r="10" fill="#facc15">
              <animateMotion
                dur="4s"
                repeatCount="indefinite"
                path="M850 140 L-50 140"/>
            </circle>

            <!-- spaceship -->
            <polygon points="80,100 40,80 40,120" fill="#38bdf8">
              <animateTransform
                attributeName="transform"
                type="translate"
                values="0 0;0 -8;0 0;0 8;0 0"
                dur="2s"
                repeatCount="indefinite"/>
            </polygon>

            <!-- title -->
            <text x="400"
                  y="30"
                  text-anchor="middle"
                  fill="#38bdf8"
                  font-size="24"
                  font-family="Verdana">
              SPACE RUNNER
            </text>

          </svg>
          EOF

      - name: Commit SVG
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/space-runner.svg

          git commit -m "Update Space Runner animation" || echo "No changes"

          git push
