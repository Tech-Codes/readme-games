<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">

  <rect width="800" height="200" fill="#0f172a" rx="20"/>

  <!-- stars -->
  <circle cx="100" cy="40" r="2" fill="white"/>
  <circle cx="250" cy="70" r="2" fill="white"/>
  <circle cx="500" cy="50" r="2" fill="white"/>
  <circle cx="700" cy="90" r="2" fill="white"/>

  <!-- enemy -->
  <circle r="12" fill="#ef4444">
    <animateMotion
      dur="6s"
      repeatCount="indefinite"
      path="M850 60 L-50 60"/>
  </circle>

  <!-- collectible -->
  <circle r="10" fill="#facc15">
    <animateMotion
      dur="4s"
      repeatCount="indefinite"
      path="M850 140 L-50 140"/>
  </circle>

  <!-- spaceship -->
  <polygon points="80,100 40,80 40,120" fill="#38bdf8">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0 0;0 -8;0 0;0 8;0 0"
      dur="2s"
      repeatCount="indefinite"/>
  </polygon>

  <!-- title -->
  <text x="400"
        y="30"
        text-anchor="middle"
        fill="#38bdf8"
        font-size="24"
        font-family="Verdana">
    SPACE RUNNER
  </text>

</svg>
